<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد يا روان ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: 'Amiri', serif; /* الخط الأساسي المزخرف */
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* خلفية النجوم المتحركة */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: #000 url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat top center;
        }

        .twinkling {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/twinkling.png') repeat top center;
            animation: move-twink-back 200s linear infinite;
        }

        @keyframes move-twink-back {
            from { background-position: 0 0; }
            to { background-position: -10000px 5000px; }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            text-align: center;
            min-height: 100vh;
            justify-content: center;
        }

        .content-box {
            max-width: 750px;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 77, 77, 0.3);
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.2);
        }

        h1 {
            color: #ff4d4d;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.8);
        }

        /* تنسيق الجمل التي ستظهر حرفاً بحرف */
        .typewriter-text {
            font-size: 1.5rem;
            line-height: 2;
            margin-bottom: 25px;
            min-height: 1.5em;
            display: block;
        }

        .highlight {
            color: #ff4d4d;
            font-weight: bold;
            font-size: 1.8rem;
            display: block;
            margin: 15px 0;
        }

        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4d4d;
            transition: 0.3s;
            font-family: 'Reem Kufi', sans-serif;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ff4d4d;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ff4d4d;
            background: #1a1a1a;
            color: white;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            width: 80%;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            background-color: #ff4d4d;
            margin-right: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>
    <div class="twinkling"></div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="lockScreen" class="content-box">
            <h2 style="color: #ff4d4d; font-family: 'Reem Kufi';">الموقع محمي ❤️</h2>
            <p>اكتب كلمة المرور علشان تشوف المفاجأة</p>
            <input type="text" id="passwordInput" placeholder="ادخلي كلمة المرور هنا...">
            <button onclick="checkPassword()">دخول ✨
